<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Servicios Google</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="glass-panel text-center">
            <h1>Explorador de Servicios Google</h1>
            <p>Integración de YouTube, Maps y Books API</p>
            <div class="search-container global-search">
                <input type="text" id="global-search-input" placeholder="Ingresa un término de búsqueda (ej. Inteligencia Artificial)">
                <button id="global-search-btn">Buscar en API</button>
            </div>
        </header>

        <div class="grid-layout">
            <!-- Google Books Section -->
            <section class="api-card glass-panel" id="books-section">
                <h2>📚 Google Books API</h2>
                <div id="books-results" class="results-container">
                    <div class="placeholder-text">Los resultados aparecerán aquí...</div>
                </div>
            </section>

            <!-- YouTube Video Section -->
            <section class="api-card glass-panel" id="youtube-section">
                <h2>📺 YouTube Data API</h2>
                <div id="video-results" class="results-container">
                    <div class="placeholder-text">El video aparecerá aquí...</div>
                </div>
            </section>

            <!-- Google Maps Section -->
            <section class="api-card glass-panel span-full" id="maps-section">
                <h2>🗺️ Google Maps API</h2>
                <p>Nuestra ubicación de referencia:</p>
                <div id="map" class="map-container"></div>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
